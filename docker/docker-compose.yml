services:
  mapm-ar:
    build: .
    image: ar-mapm:latest
    container_name: ar_mapm
    restart: unless-stopped

    ports:
      - "${PORT:-3001}:3001"

    volumes:
      - ./data:/app/data          # database persists in data/ next to this file

    env_file:
      - path: .env
        required: false

    environment:
      - DB_PATH=/app/data/mapm.db
      - NODE_ENV=production
      - TZ=Asia/Bangkok

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
